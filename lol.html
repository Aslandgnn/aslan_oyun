<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Mini NFS - Traffic Racer</title>
    <style>
        body { margin: 0; background: #222; display: flex; justify-content: center; align-items: center; height: 100vh; color: white; font-family: 'Arial Black', sans-serif; overflow: hidden; }
        canvas { background: #333; border: 4px solid #555; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .ui { position: absolute; top: 20px; text-align: center; pointer-events: none; }
        #gameOver { position: absolute; display: none; background: rgba(0,0,0,0.8); padding: 20px; border-radius: 10px; text-align: center; }
    </style>
</head>
<body>
    <a href="/aslan_oyun/index.html">ana menüye don</a>
    <div class="ui">
        <h2 id="scoreBoard">SKOR: 0</h2>
        <p>A-D veya Ok Tuşları ile Yön Ver!</p>
    </div>

    <div id="gameOver">
        <h1>KAZA YAPTIN!</h1>
        <p id="finalScore"></p>
        <button onclick="location.reload()" style="padding: 10px 20px; cursor: pointer;">YENİDEN BAŞLA</button>
    </div>

    <canvas id="gameCanvas" width="400" height="600"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreBoard = document.getElementById("scoreBoard");
        const gameOverScreen = document.getElementById("gameOver");

        // Oyun Ayarları
        let gameActive = true;
        let score = 0;
        let roadOffset = 0;
        let gameSpeed = 5;

        // Oyuncu Arabası
        let player = { x: 175, y: 500, w: 50, h: 80, color: "#e74c3c" };

        // Bot Arabalar
        let bots = [];
        let botColors = ["#f1c40f", "#3498db", "#9b59b6", "#2ecc71"];

        function spawnBot() {
            if (!gameActive) return;
            const lane = Math.floor(Math.random() * 3); // 3 şerit
            const xPos = 60 + (lane * 100);
            bots.push({
                x: xPos,
                y: -100,
                w: 50,
                h: 80,
                color: botColors[Math.floor(Math.random() * botColors.length)],
                speed: 2 + Math.random() * 3
            });
            setTimeout(spawnBot, 1000 - (gameSpeed * 10)); // Hızlandıkça daha sık bot gelir
        }

        // Kontroller
        let keys = {};
        window.onkeydown = (e) => keys[e.code] = true;
        window.onkeyup = (e) => keys[e.code] = false;

        function update() {
            if (!gameActive) return;

            // Yol Hareketi
            roadOffset += gameSpeed;
            if (roadOffset > 100) roadOffset = 0;

            // Oyuncu Hareketi
            if ((keys["KeyA"] || keys["ArrowLeft"]) && player.x > 50) player.x -= 5;
            if ((keys["KeyD"] || keys["ArrowRight"]) && player.x < 300) player.x += 5;

            // Bot Hareketleri ve Çarpışma
            bots.forEach((bot, index) => {
                bot.y += gameSpeed - 1; // Botlar oyuncuya göre biraz daha yavaş aşağı akar

                // Çarpışma Kontrolü
                if (player.x < bot.x + bot.w &&
                    player.x + player.w > bot.x &&
                    player.y < bot.y + bot.h &&
                    player.y + player.h > bot.y) {
                    endGame();
                }

                // Ekrandan çıkan botları sil ve puan ekle
                if (bot.y > canvas.height) {
                    bots.splice(index, 1);
                    score += 10;
                    gameSpeed += 0.1; // Oyun kademeli hızlanır
                    scoreBoard.innerText = "SKOR: " + score;
                }
            });
        }

        function drawCar(x, y, w, h, color, isPlayer) {
            ctx.fillStyle = color;
            ctx.fillRect(x, y, w, h); // Gövde
            // Tekerlekler
            ctx.fillStyle = "black";
            ctx.fillRect(x - 5, y + 10, 5, 20);
            ctx.fillRect(x + w, y + 10, 5, 20);
            ctx.fillRect(x - 5, y + 50, 5, 20);
            ctx.fillRect(x + w, y + 50, 5, 20);
            // Cam
            ctx.fillStyle = "rgba(255,255,255,0.5)";
            ctx.fillRect(x + 5, y + 15, w - 10, 15);
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Asfalt
            ctx.fillStyle = "#333";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Yol Çizgileri
            ctx.strokeStyle = "white";
            ctx.setLineDash([40, 20]);
            ctx.lineDashOffset = -roadOffset;
            ctx.lineWidth = 5;
            
            ctx.beginPath();
            ctx.moveTo(133, 0); ctx.lineTo(133, 600);
            ctx.moveTo(266, 0); ctx.lineTo(266, 600);
            ctx.stroke();

            // Yol Kenarları
            ctx.setLineDash([]);
            ctx.fillStyle = "#2ecc71";
            ctx.fillRect(0, 0, 40, 600);
            ctx.fillRect(360, 0, 40, 600);

            // Arabaları Çiz
            drawCar(player.x, player.y, player.w, player.h, player.color, true);
            bots.forEach(bot => drawCar(bot.x, bot.y, bot.w, bot.h, bot.color, false));
        }

        function endGame() {
            gameActive = false;
            gameOverScreen.style.display = "block";
            document.getElementById("finalScore").innerText = "Toplam Puanın: " + score;
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        spawnBot();
        loop();
    </script>
</body>
</html>
